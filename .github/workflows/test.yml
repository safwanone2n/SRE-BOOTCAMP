name: Go Tests
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'   # or your Go version
      - run: go test ./... -coverprofile=coverage.out
      - uses: codecov/codecov-action@v4
        with:
          files: coverage.out
