{{- $namespace := .Release.Namespace }}

{{- if .Values.db.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.db.svc_name }}
  namespace: {{ $namespace }}
spec:
  selector:
    app: {{ .Values.db.name }}
  ports:
    - protocol: TCP
      port: {{ .Values.db.port }}
      targetPort: {{ .Values.db.port }}
  type: ClusterIP
{{- end }}
---
{{- if .Values.app.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.app.svc_name }}
  namespace: {{ $namespace }}
spec:
  selector:
    app: {{ .Values.app.name }}
  ports:
    - protocol: TCP
      port: {{ .Values.app.port }}
      targetPort: {{ .Values.app.port }}
  type: ClusterIP
{{- end }}
