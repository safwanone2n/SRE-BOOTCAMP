apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: vault-secretstore
spec:
  provider:
    vault:
      server: "http://vault.vault-ns.svc.cluster.local:8200"
      path: "secret"          # ✅ just the mount path
      version: "v2"
      auth:
        tokenSecretRef:
          name: vault-token
          namespace: vault-ns
          key: token
