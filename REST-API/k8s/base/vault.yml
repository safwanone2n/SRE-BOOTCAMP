apiVersion: v1
kind: Namespace
metadata:
  name: vault-ns
---


apiVersion: v1
kind: Secret
metadata:
  name: vault-token
  namespace: vault-ns
stringData:
  token: "root"
---
# vault-deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vault
  namespace: vault-ns
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vault
  template:
    metadata:
      labels:
        app: vault
    spec:
      nodeSelector:
        type: dependent_services
      containers:
      - name: vault
        image: vault:1.13.3
        ports:
        - containerPort: 8200
        env:
        - name: VAULT_DEV_ROOT_TOKEN_ID
          valueFrom:
            secretKeyRef:
              name: vault-token
              key: token
        - name: VAULT_DEV_LISTEN_ADDRESS
          value: "0.0.0.0:8200"
---
apiVersion: v1
kind: Service
metadata:
  name: vault
  namespace: vault-ns
spec:
  type: ClusterIP
  ports:
    - port: 8200
      targetPort: 8200
  selector:
    app: vault
