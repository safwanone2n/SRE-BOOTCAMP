apiVersion: v1
kind: ConfigMap
metadata:
  name: rest-api-config
  namespace: rest-api-namespace
data:
  PORT: ":8080"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rest-api-deployment
  namespace: rest-api-namespace
spec:
  replicas: 2
  selector:
    matchLabels:
      app: application
  template:
    metadata:
      labels:
        app: application
    spec:
      nodeSelector:
        type: application

      # 👇 Init container runs migrations before app starts
      initContainers:
        - name: run-db-migrations
          image: safwanseban/rest-api:1.1.2
          command:
            - sh
            - -c
            - |
              echo "==> Running database migrations..."
              cd /rest/db/migrations
              tern migrate
          env:
            - name: POSTGRES_HOST
              value: "postgres-service"
            - name: POSTGRES_PORT
              value: "5432"
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: rest-api-secrets
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: rest-api-secrets
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: rest-api-secrets
                  key: POSTGRES_DB

            #   valueFrom:
            #     secretKeyRef:
            #       name: rest-api-secrets
            #       key: POSTGRES_DB
            # - name: POSTGRES_USER
            #   valueFrom:
            #     secretKeyRef:
            #       name: rest-api-secrets
            #       key: POSTGRES_USER
            # - name: POSTGRES_PASSWORD
            #   valueFrom:
            #     secretKeyRef:
            #       name: rest-api-secrets
            #       key: POSTGRES_PASSWORD
            # - name: DATABASE_URL
            #   valueFrom:
            #     secretKeyRef:
            #       name: rest-api-secrets
            #       key: DATABASE_URL

      # 👇 Main app container
      containers:
        - name: rest-api
          image: safwanseban/rest-api:1.1.2
          ports:
            - containerPort: 8080
          env:
            - name: PORT
              valueFrom:
                configMapKeyRef:
                  name: rest-api-config
                  key: PORT
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: rest-api-secrets
                  key: DATABASE_URL

---
apiVersion: v1
kind: Service
metadata:
  name: rest-api-service
  namespace: rest-api-namespace
spec:
  selector:
    app: application
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080
  type: ClusterIP
