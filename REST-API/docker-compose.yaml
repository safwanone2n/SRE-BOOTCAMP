services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rest-api
    env_file:
      - .env
    depends_on:
      - db
    ports:
      - "8080:8081"
    restart: unless-stopped

  db:
    image: postgres:14.5
    container_name: rest-db
    env_file:
      - .env         # Reads POSTGRES_USER, POSTGRES_PASSWORD, POSTGRES_DB
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped

volumes:
  pgdata:
